<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genre Masher 3000</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0033, #4a0080, #ff006e, #ffbe0b);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    text-align: center;
    margin: 0 0 10px;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #ff006e;
    letter-spacing: 2px;
  }
  .tagline {
    font-style: italic;
    opacity: 0.9;
    margin-bottom: 30px;
    text-align: center;
  }
  .container {
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);
    border: 3px solid #ffbe0b;
    border-radius: 16px;
    padding: 30px;
    max-width: 1000px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .slots {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 25px;
  }
  @media (min-width: 700px) {
    .slots { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1000px) {
    .slots { grid-template-columns: 1fr 1fr 1fr; }
  }
  .slot {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s;
  }
  .slot.rolling {
    animation: shake 0.4s infinite;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-3px) rotate(-1deg); }
    75% { transform: translateX(3px) rotate(1deg); }
  }
  .slot-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .slot-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .slot-value {
    font-size: 1.2rem;
    font-weight: bold;
    line-height: 1.25;
  }
  .slot-sub {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 6px;
    font-style: italic;
  }
  .pitch {
    background: rgba(255, 190, 11, 0.15);
    border-left: 4px solid #ffbe0b;
    padding: 18px 22px;
    border-radius: 8px;
    margin-bottom: 25px;
    font-size: 1.05rem;
    min-height: 60px;
    line-height: 1.5;
  }
  .pitch.empty { opacity: 0.5; font-style: italic; }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 14px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.4); }
  button:active { transform: translateY(0); }
  .smash {
    background: #ff006e;
    color: #fff;
  }
  .poster-area {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 0;
  }
  .poster-area img {
    max-width: 100%;
    width: 520px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 3px solid #ffbe0b;
  }
  .synopsis {
    max-width: 600px;
    margin: 20px auto 4px;
    font-size: 1rem;
    line-height: 1.55;
    text-align: center;
    opacity: 0.92;
  }
  .bts {
    max-width: 600px;
    margin: 4px auto 0;
    width: 100%;
    font-size: 0.85rem;
    text-align: left;
  }
  .bts summary {
    cursor: pointer;
    opacity: 0.6;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 0.72rem;
    list-style: none;
  }
  .bts summary:hover { opacity: 0.9; }
  .bts summary::before { content: '▸ '; }
  .bts[open] summary::before { content: '▾ '; }
  .bts-label {
    margin-top: 10px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.55;
  }
  .bts pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 4px 0 0;
    font-size: 0.78rem;
    line-height: 1.45;
    max-height: 260px;
    overflow: auto;
  }
  .footer-links {
    text-align: center;
    margin-top: 28px;
    margin-bottom: 8px;
    font-size: 0.75rem;
    opacity: 0.45;
    max-width: 1000px;
  }
  .footer-links a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px dotted rgba(255,255,255,0.4);
  }
  .footer-links a:hover { opacity: 1; border-bottom-color: #fff; }
  .poster-area .loading {
    padding: 40px;
    font-style: italic;
    opacity: 0.8;
    text-align: center;
  }
  .poster-area .loading::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  .pitch-tag {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    vertical-align: middle;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,190,11,0.25);
    border: 1px solid rgba(255,190,11,0.5);
    opacity: 0.85;
  }
  .stats {
    text-align: center;
    margin-top: 20px;
    font-size: 0.7rem;
    opacity: 0.2;
    font-variant-numeric: tabular-nums;
    cursor: default;
  }
  .gallery-link {
    text-align: center;
    margin-top: 16px;
    margin-bottom: 32px;
  }
  .gallery-link a {
    color: #ffbe0b;
    font-weight: bold;
    text-decoration: none;
    border-bottom: 2px dashed rgba(255,190,11,0.5);
    padding-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .gallery-link a:hover {
    color: #fff;
    border-bottom-color: #fff;
  }
  .breadcrumb {
    position: absolute;
    top: 16px; left: 20px;
    font-size: 0.85rem;
    opacity: 0.65;
  }
  .breadcrumb a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,255,255,0.4);
  }
  .breadcrumb a:hover { opacity: 1; border-bottom-color: #fff; }
</style>
</head>
<body>
  <div class="breadcrumb"><a href="../">&larr; one-offs</a></div>
  <h1>Genre Masher 3000</h1>
  <div class="tagline">Pull a real AI-pitched film from the vault</div>

  <div class="container">
    <div class="slots">
      <div class="slot" id="slot1">
        <div>
          <div class="slot-label">Genre #1</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="genre1">???</div>
          <div class="slot-sub" id="sub1">&nbsp;</div>
        </div>
      </div>
      <div class="slot" id="slot2">
        <div>
          <div class="slot-label">Mashed With</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="genre2">???</div>
          <div class="slot-sub" id="sub2">&nbsp;</div>
        </div>
      </div>
      <div class="slot" id="slot3">
        <div>
          <div class="slot-label">Starring A</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="character">???</div>
        </div>
      </div>
    </div>

    <div class="pitch empty" id="pitch">Hit the button to pull a film from the vault...</div>

    <div class="controls">
      <button class="smash" id="smashBtn">🎬 Smash Genres!</button>
    </div>

    <div class="poster-area" id="posterArea"></div>

    <div class="stats" id="stats" title="films remaining this cycle">&middot;&middot;&middot;</div>
  </div>

  <div class="footer-links">
    Posters were pre-rendered by an LLM + ComfyUI. Browse the full galleries:
    <a href="mashups_krea.html">Krea</a> &middot;
    <a href="mashups_ideogram4.html">Ideogram 4</a> &middot;
    <a href="mashups_zimage.html">Z-Image</a>
  </div>

<script>
// The game serves PRE-GENERATED films from the batch generator. Each backend
// writes a manifest (mashups_<backend>.json) listing its rendered posters with
// their real genres/character/title/synopsis. We fetch the configured backends'
// manifests and merge them into one pool; "Smash Genres!" shuffles the deck and
// reveals a real film.
//
// Which backends feed the pool is configurable: the default is all of them, but
// you can narrow it with a ?backends= query param, e.g.
//   index.html?backends=ideogram4         (just Ideogram 4)
//   index.html?backends=ideogram4,krea     (two of them)
// NOTE: browsers block fetch() over file:// — serve this folder
// (e.g. `python -m http.server`) rather than double-clicking.
const DEFAULT_BACKENDS = ['zimage', 'ideogram4', 'krea'];

function selectedBackends() {
  const param = new URLSearchParams(location.search).get('backends');
  if (!param) return DEFAULT_BACKENDS;
  const names = param.split(',').map(s => s.trim()).filter(Boolean);
  return names.length ? names : DEFAULT_BACKENDS;
}

let GENRES = {};
let CHARACTERS = [];
let FILMS = [];          // merged pre-generated pool
let DATA_READY = false;

async function loadGameData() {
  // genres.json still drives the spinning reel labels (the flavor of the roll).
  const gRes = await fetch('genres.json');
  if (!gRes.ok) throw new Error('genres.json HTTP ' + gRes.status);
  const gData = await gRes.json();
  GENRES = gData.genres;
  CHARACTERS = gData.characters;

  // Pull each configured backend's manifest; tolerate missing ones (a backend
  // you haven't run yet just contributes nothing).
  const backends = selectedBackends();
  const settled = await Promise.all(backends.map(async name => {
    try {
      const res = await fetch(`mashups_${name}.json`);
      if (!res.ok) return [];
      const data = await res.json();
      return (data.films || []).map(f => ({ ...f, backend: data.backend, ratio: data.ratio }));
    } catch (e) {
      console.warn(`manifest for ${name} unavailable`, e);
      return [];
    }
  }));
  FILMS = settled.flat();
  if (!FILMS.length) {
    throw new Error('no films in pool (backends: ' + backends.join(', ') + ')');
  }
  DATA_READY = true;
}

const PITCH_TEMPLATES = [
  (g1, g2, c) => `It's <b>${g1}</b> meets <b>${g2}</b>... but the protagonist is a <b>${c}</b>. Studio notes say "lean into the weird".`,
  (g1, g2, c) => `Imagine if a <b>${g1}</b> show had a baby with a <b>${g2}</b> miniseries, and that baby grew up to follow a <b>${c}</b>.`,
  (g1, g2, c) => `Set in a world where <b>${g1}</b> and <b>${g2}</b> coexist uneasily, our hero — a <b>${c}</b> — must save... something. Probably a town.`,
  (g1, g2, c) => `Pitch: <b>${g1}</b> × <b>${g2}</b>. Tone: dread, but make it horny. Lead: a <b>${c}</b>. Six episodes. We're calling it Emmy bait.`,
  (g1, g2, c) => `A <b>${c}</b> stumbles into a <b>${g1}</b> conspiracy that can only be solved using the rules of <b>${g2}</b>. The streaming service is "intrigued".`,
  (g1, g2, c) => `Three words: <b>${g1}</b>. <b>${g2}</b>. <b>${c}</b>. The trailer drops Tuesday. There will be a sad needle-drop cover of a 2003 hit.`,
  (g1, g2, c) => `Picture a <b>${g1}</b> setting, but everyone behaves like they're in a <b>${g2}</b>. Our reluctant hero: a <b>${c}</b>. There is a dance scene.`,
  (g1, g2, c) => `Logline: When a <b>${c}</b> discovers their quiet life is actually a <b>${g1}</b>, they must master the genre conventions of <b>${g2}</b> to survive.`,
  (g1, g2, c) => `Three-act structure: <b>${g1}</b> in act one, <b>${g2}</b> by act three, and a <b>${c}</b> sobbing into a microwave dinner the whole time. Critics will call it "brave".`,
  (g1, g2, c) => `Cold open: a <b>${c}</b>, alone, in the rain. The genre? <b>${g1}</b>. The vibe? Unmistakably <b>${g2}</b>. Cue title card.`
];

const state = {
  count: 0,
  current: null   // the film currently shown
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Shuffle-bag: deal through a shuffled copy of the pool without repeats, then
// reshuffle when it's empty. This shows every film once per cycle and never an
// immediate repeat — nicer than pure with-replacement on a finite pool.
let filmBag = [];
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function nextFilm() {
  if (!filmBag.length) {
    filmBag = shuffle(FILMS);
    // Avoid an immediate repeat across the reshuffle boundary.
    if (filmBag.length > 1 && state.current && filmBag[filmBag.length - 1] === state.current) {
      filmBag.unshift(filmBag.pop());
    }
  }
  return filmBag.pop();
}

function rollSlot(slotEl, finalText, finalSub, pool, duration, isObject) {
  return new Promise(resolve => {
    slotEl.classList.add('rolling');
    const valueEl = slotEl.querySelector('.slot-value');
    const subEl = slotEl.querySelector('.slot-sub');
    const start = Date.now();
    const interval = setInterval(() => {
      const item = pool[Math.floor(Math.random() * pool.length)];
      if (isObject) {
        valueEl.textContent = item.major;
        if (subEl) subEl.textContent = item.sub || '';
      } else {
        valueEl.textContent = item;
        if (subEl) subEl.textContent = '';
      }
      if (Date.now() - start >= duration) {
        clearInterval(interval);
        valueEl.textContent = finalText;
        if (subEl) subEl.textContent = finalSub || '';
        slotEl.classList.remove('rolling');
        resolve();
      }
    }, 60);
  });
}

async function smash() {
  const btn = document.getElementById('smashBtn');
  btn.disabled = true;

  // Deal the next film from the shuffle-bag (no repeats until the pool cycles).
  const film = nextFilm();
  state.current = film;

  // Reels spin over genre/character flavor, then land on the film's real values.
  const genrePool = Object.keys(GENRES).flatMap(m => GENRES[m].map(s => ({ major: m, sub: s })));
  await Promise.all([
    rollSlot(document.getElementById('slot1'), film.genre_1_major, film.genre_1_sub, genrePool, 700, true),
    rollSlot(document.getElementById('slot2'), film.genre_2_major, film.genre_2_sub, genrePool, 950, true),
    rollSlot(document.getElementById('slot3'), film.character, '', CHARACTERS, 1150, false),
  ]);

  // Show the film's real title as the "pitch".
  const pitchEl = document.getElementById('pitch');
  pitchEl.classList.remove('empty');
  pitchEl.innerHTML = `<b>${escapeHTML(film.title)}</b>` +
    (film.backend ? ` <span class="pitch-tag">${escapeHTML(film.backend)}</span>` : '');

  // Reveal the pre-rendered poster + synopsis.
  revealFilm(film);

  state.count++;
  // Full detail goes to the console; the UI shows just a single mysterious
  // number — how many unseen films remain in this shuffle-bag cycle (it ticks
  // down to 0, then refills on the next reshuffle).
  console.log(`Films pitched: ${state.count} · pool: ${FILMS.length}`);
  document.getElementById('stats').textContent = filmBag.length;
  btn.disabled = false;
}

function escapeHTML(s) {
  return (s || '').replace(/[&<>"]/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function revealFilm(film) {
  const area = document.getElementById('posterArea');
  area.innerHTML = '<div class="loading">Pulling the poster from the vault</div>';

  const img = new Image();
  img.onload = () => {
    area.innerHTML = '';
    area.appendChild(img);
    if (film.synopsis) {
      const syn = document.createElement('div');
      syn.className = 'synopsis';
      syn.textContent = film.synopsis;
      area.appendChild(syn);
    }
    area.appendChild(buildBTS(film));
  };
  img.onerror = () => {
    area.innerHTML = '<div class="loading">Poster image missing. Try another smash?</div>';
  };
  img.src = film.image;
  img.alt = film.title;
}

// "Behind the scenes": the seed pitch and the raw image prompt that produced
// this poster, mirroring the static gallery's collapsible panel.
function buildBTS(film) {
  const det = document.createElement('details');
  det.className = 'bts';
  const sum = document.createElement('summary');
  sum.textContent = 'Behind the scenes';
  det.appendChild(sum);

  const rows = [
    ['Seed pitch', stripTags(film.pitch)],
    ['Image prompt', film.image_prompt],
  ];
  for (const [label, value] of rows) {
    if (!value) continue;
    const lab = document.createElement('div');
    lab.className = 'bts-label';
    lab.textContent = label + ':';
    const pre = document.createElement('pre');
    pre.textContent = value;
    det.appendChild(lab);
    det.appendChild(pre);
  }
  return det;
}

// The seed pitch is stored with <b>…</b> emphasis from the templates; show it
// as plain text in the BTS panel.
function stripTags(s) { return (s || '').replace(/<[^>]*>/g, ''); }

document.getElementById('smashBtn').addEventListener('click', smash);

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON') {
    e.preventDefault();
    if (DATA_READY) smash();
  }
});

// Load genre + pre-generated film data before enabling the game.
const smashBtn = document.getElementById('smashBtn');
smashBtn.disabled = true;
loadGameData()
  .then(() => {
    smashBtn.disabled = false;
    // Mysterious countdown starts at the full pool size (nothing seen yet).
    console.log(`Films pitched: 0 · pool: ${FILMS.length}`);
    document.getElementById('stats').textContent = FILMS.length;
  })
  .catch(err => {
    console.error(err);
    document.getElementById('pitch').innerHTML =
      "Couldn't load the film pool. This page must be <b>served over HTTP</b> " +
      "(e.g. run <code>python&nbsp;-m&nbsp;http.server</code> in this folder), and at " +
      "least one <code>mashups_&lt;backend&gt;.json</code> manifest must exist " +
      "(run <code>generate_mashups.py</code> first).";
  });
</script>
</body>
</html>
