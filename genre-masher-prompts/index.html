<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genre Masher 3000</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0033, #4a0080, #ff006e, #ffbe0b);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }
  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    text-align: center;
    margin: 0 0 10px;
    text-shadow: 4px 4px 0 #000, -2px -2px 0 #ff006e;
    letter-spacing: 2px;
  }
  .tagline {
    font-style: italic;
    opacity: 0.9;
    margin-bottom: 30px;
    text-align: center;
  }
  .container {
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);
    border: 3px solid #ffbe0b;
    border-radius: 16px;
    padding: 30px;
    max-width: 1000px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .slots {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 25px;
  }
  @media (min-width: 700px) {
    .slots { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1000px) {
    .slots { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .slot {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 18px;
    text-align: center;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s;
  }
  .slot.rolling {
    animation: shake 0.4s infinite;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-3px) rotate(-1deg); }
    75% { transform: translateX(3px) rotate(1deg); }
  }
  .slot-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .slot-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .slot-value {
    font-size: 1.2rem;
    font-weight: bold;
    line-height: 1.25;
  }
  .slot-sub {
    font-size: 0.8rem;
    opacity: 0.8;
    margin-top: 6px;
    font-style: italic;
  }
  .pitch {
    background: rgba(255, 190, 11, 0.15);
    border-left: 4px solid #ffbe0b;
    padding: 18px 22px;
    border-radius: 8px;
    margin-bottom: 25px;
    font-size: 1.05rem;
    min-height: 60px;
    line-height: 1.5;
  }
  .pitch.empty { opacity: 0.5; font-style: italic; }
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  button {
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 14px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.4); }
  button:active { transform: translateY(0); }
  .smash {
    background: #ff006e;
    color: #fff;
  }
  .poster {
    background: #ffbe0b;
    color: #000;
  }
  .poster:disabled {
    background: rgba(255,190,11,0.3);
    color: rgba(0,0,0,0.5);
    cursor: not-allowed;
  }
  .poster:disabled:hover { transform: none; box-shadow: none; }
  .poster-credit {
    text-align: center;
    margin-top: 14px;
    font-size: 0.78rem;
    opacity: 0.6;
    font-style: italic;
  }
  .poster-credit a { color: #ffbe0b; text-decoration: none; border-bottom: 1px dashed rgba(255,190,11,0.5); }
  .poster-credit a:hover { color: #fff; border-bottom-color: #fff; }
  .poster-area {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    min-height: 0;
  }
  .poster-area img {
    max-width: 100%;
    width: 480px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 3px solid #ffbe0b;
  }
  .poster-area .loading {
    padding: 40px;
    font-style: italic;
    opacity: 0.8;
    text-align: center;
  }
  .poster-area .loading::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  .lock {
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 0.75rem;
    padding: 6px 12px;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }
  .lock.locked { background: #ffbe0b; color: #000; }
  .stats {
    text-align: center;
    margin-top: 20px;
    font-size: 0.85rem;
    opacity: 0.7;
  }
  .gallery-link {
    text-align: center;
    margin-top: 16px;
    margin-bottom: 32px;
  }
  .gallery-link a {
    color: #ffbe0b;
    font-weight: bold;
    text-decoration: none;
    border-bottom: 2px dashed rgba(255,190,11,0.5);
    padding-bottom: 2px;
    letter-spacing: 0.5px;
  }
  .gallery-link a:hover {
    color: #fff;
    border-bottom-color: #fff;
  }
</style>
</head>
<body>
  <h1>Genre Masher 3000</h1>
  <div class="tagline">Pitch the next streaming hit nobody asked for</div>
  <div class="gallery-link">→ <a href="mashups.html">Browse the AI-generated poster gallery</a></div>

  <div class="container">
    <div class="slots">
      <div class="slot" id="slot1">
        <div>
          <div class="slot-label">Genre #1</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="genre1">???</div>
          <div class="slot-sub" id="sub1">&nbsp;</div>
        </div>
        <button class="lock" data-slot="1">🔓 Lock</button>
      </div>
      <div class="slot" id="slot2">
        <div>
          <div class="slot-label">Mashed With</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="genre2">???</div>
          <div class="slot-sub" id="sub2">&nbsp;</div>
        </div>
        <button class="lock" data-slot="2">🔓 Lock</button>
      </div>
      <div class="slot" id="slot3">
        <div>
          <div class="slot-label">Starring A</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="character">???</div>
        </div>
        <button class="lock" data-slot="3">🔓 Lock</button>
      </div>
      <div class="slot" id="slot4">
        <div>
          <div class="slot-label">Who Is...</div>
        </div>
        <div class="slot-content">
          <div class="slot-value" id="quirk">???</div>
        </div>
        <button class="lock" data-slot="4">🔓 Lock</button>
      </div>
    </div>

    <div class="pitch empty" id="pitch">Hit the button to generate your unhinged pitch...</div>

    <div class="controls">
      <button class="smash" id="smashBtn">🎬 Smash Genres!</button>
      <button class="poster" id="posterBtn" disabled>🖼️ Generate Poster</button>
    </div>
    <div class="poster-credit">Posters generated by <a href="https://image.pollinations.ai" target="_blank" rel="noopener">image.pollinations.ai</a></div>

    <div class="poster-area" id="posterArea"></div>

    <div class="stats" id="stats">Pitches generated: 0</div>
  </div>

<script>
const GENRES = {
  "Horror": [

  ],
  "Romance": [
    "Regency Bodice-Ripper",
    "Enemies-to-Lovers",
    "Monster Romance (he is a kraken)",
    "Mafia Romance",
    "Small-Town Christmas Romance",
    "Time-Travel Romance",
    "Workplace Slow-Burn",
    "Marriage of Convenience",

  ],
  "Sci-Fi": [

  ],
  "Fantasy": [

  ],

  ],

  ],
  "Drama": [

    "Slow Cinema (a man stares at a lake)",

  ],
  "Action": [
    "Heist",
    "Spy Thriller",

    "Revenge Thriller (he killed my dog)",
    "Buddy Cop",

    "Parkour Chase Movie",

  ],
  "Documentary-style": [
    "True Crime (let me look at this map)",
    "Nature Documentary (gentle British narrator)",
    "Sports Doc",

    "Food Porn Doc",

    "Conspiracy Doc",

  ],

    "Hauntology (lost media core)",

  ],
  "Western": [
    "Acid Western (peyote-fueled)",
    "Spaghetti Western",
    "Weird West (cowboys + monsters)",
    "Modern Neo-Western",
    "Revisionist Western"
  ],
  "Musical": [
    "Jukebox Musical",
    "Rock Opera",
    "Sad Indie Folk Musical",
    "Crime Musical (everyone sings about taxes)",
    "Surrealist Dance Musical"
  ]
};

const CHARACTERS = [
  "Disgraced Sommelier",
  "Sentient Roomba",
  "Retired Assassin",
  "Conspiracy-Theorist Librarian",
  "Goth Accountant",
  "Himbo Pirate",
  "Tax-Dodging Witch",
  "Time-Traveling Plumber",
  "Cursed Beauty Pageant Winner",
  "Bog Witch",
  "Disillusioned Cult Defector",
  "Call Center Vampire",
  "Talking Horse",
  "Reluctant Middle Manager",
  "Former Child Star",
  "Doomsday Prepper Grandma",
  "Legalese-Speaking Ghost",
  "Influencer Exorcist",
  "Spare Royal Twin",
  "Mall Cop",
  "Anxious Cryptozoologist",
  "Gardening AI",
  "Fading Magician's Assistant",
  "Mediocre Knight",
  "Superhero Therapist",
  "Stand-Up Plague Doctor",
  "Disgraced Olympic Curler",
  "Union-Rep Fairy Godmother",
  "Cowboy Astronaut",
  "Reformed Demon",
  "Substitute Teacher",
  "Polite Cannibal Food Critic",
  "Anxious Werewolf",
  "Ex-Pop-Star Goat Farmer",
  "Underworld Bureaucrat",
  "Failed Wizard",
  "Disgruntled Tooth Fairy",
  "Sentient Houseplant",
  "Medieval Town Crier",
  "Murder-Hobo Adventurer",
  "Mediocre Oracle",
  "Burned-Out Knight",
  "Rideshare-Driving Centaur",
  "Theater Kid Detective",
  "Failed Mall Santa",
  "Disgraced Bee Inspector",
  "HOA-President Lich",
  "Reluctant Pope",
  "Off-Brand Superhero",
  "Suburban Dad Necromancer",
  "Gen-Z Pirate",
  "Kindergarten Teacher Spy",
  "Sentient Vending Machine",
  "Aging Boy Band Member",
  "Renaissance Fair Champion",
  "DMV Clerk Demigod"
];

const QUIRKS = [
  "with a heart of gold",
  "seeking redemption",
  "with PTSD",
  "who runs a bakery",
  "who has not paid her taxes",
  "with strong opinions about jazz",
  "in a polycule",
  "doing court-ordered community service",
  "going through a messy divorce",
  "training for a marathon",
  "with prophetic dreams",
  "with crippling anxiety",
  "who just wants to garden",
  "with a podcast nobody listens to",
  "haunted by a single regret",
  "who is allergic to their own job",
  "writing a memoir",
  "with three ex-husbands and a parrot",
  "who learned everything from YouTube",
  "secretly running a Ponzi scheme",
  "raising a teenager alone",
  "who only speaks in movie quotes",
  "competing on a reality show",
  "with a vendetta against a specific seagull",
  "in their flop era",
  "who pivoted to crypto last year",
  "trying veganism",
  "in witness protection",
  "with a doctorate in medieval poetry",
  "who is also a twin (it's relevant)",
  "running for local office",
  "stuck in a time loop",
  "with a court-mandated emotional support animal",
  "going through perimenopause",
  "newly sober and rage-y about it",
  "who just inherited a haunted mansion",
  "afraid of birds (specifically)",
  "moonlighting as a wedding singer",
  "with one eye and a grudge",
  "who has been replaced by a doppelgänger and nobody noticed",
  "currently being sued",
  "trying to win back their ex",
  "secretly the chosen one (don't tell them)",
  "with golden retriever energy",
  "who has seen things, man",
  "in deep with the wrong people",
  "doing a TED Talk circuit",
  "raising bees as therapy",
  "who never finished their PhD",
  "with a mysterious birthmark",
  "currently ghosting their family group chat",
  "two weeks from retirement",
  "obsessed with a single Wikipedia article",
  "running a failing food truck",
  "who married into a cult by accident",
  "with a rival for some reason"
];

const PITCH_TEMPLATES = [
  (g1, g2, c, q) => `It's <b>${g1}</b> meets <b>${g2}</b>... but the protagonist is a <b>${c}</b> ${q}. Studio notes say "lean into the weird".`,
  (g1, g2, c, q) => `Imagine if a <b>${g1}</b> show had a baby with a <b>${g2}</b> miniseries, and that baby grew up to be a <b>${c}</b> ${q}.`,
  (g1, g2, c, q) => `Set in a world where <b>${g1}</b> and <b>${g2}</b> coexist uneasily, our hero — a <b>${c}</b> ${q} — must save... something. Probably a town.`,
  (g1, g2, c, q) => `Pitch: <b>${g1}</b> × <b>${g2}</b>. Tone: dread, but make it horny. Lead: a <b>${c}</b> ${q}. Six episodes. We're calling it Emmy bait.`,
  (g1, g2, c, q) => `A <b>${c}</b> ${q} stumbles into a <b>${g1}</b> conspiracy that can only be solved using the rules of <b>${g2}</b>. The streaming service is "intrigued".`,
  (g1, g2, c, q) => `Four words: <b>${g1}</b>. <b>${g2}</b>. <b>${c}</b>. ${q}. The trailer drops Tuesday. There will be a sad needle-drop cover of a 2003 hit.`,
  (g1, g2, c, q) => `Picture a <b>${g1}</b> setting, but everyone behaves like they're in a <b>${g2}</b>. Our reluctant hero: a <b>${c}</b> ${q}. There is a dance scene.`,
  (g1, g2, c, q) => `Logline: When a <b>${c}</b> ${q} discovers their quiet life is actually a <b>${g1}</b>, they must master the genre conventions of <b>${g2}</b> to survive.`,
  (g1, g2, c, q) => `Three-act structure: <b>${g1}</b> in act one, <b>${g2}</b> by act three, and a <b>${c}</b> ${q} sobbing into a microwave dinner the whole time. Critics will call it "brave".`,
  (g1, g2, c, q) => `Cold open: a <b>${c}</b> ${q}, alone, in the rain. The genre? <b>${g1}</b>. The vibe? Unmistakably <b>${g2}</b>. Cue title card.`
];

const state = {
  count: 0,
  locked: { 1: false, 2: false, 3: false, 4: false },
  current: { 1: null, 2: null, 3: null, 4: null }
};

function pickGenreWithSub(excludeMajor) {
  const majors = Object.keys(GENRES).filter(m => m !== excludeMajor);
  const major = majors[Math.floor(Math.random() * majors.length)];
  const subs = GENRES[major];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  return { major, sub };
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function rollSlot(slotEl, finalText, finalSub, pool, duration, isObject) {
  return new Promise(resolve => {
    slotEl.classList.add('rolling');
    const valueEl = slotEl.querySelector('.slot-value');
    const subEl = slotEl.querySelector('.slot-sub');
    const start = Date.now();
    const interval = setInterval(() => {
      const item = pool[Math.floor(Math.random() * pool.length)];
      if (isObject) {
        valueEl.textContent = item.major;
        if (subEl) subEl.textContent = item.sub || '';
      } else {
        valueEl.textContent = item;
        if (subEl) subEl.textContent = '';
      }
      if (Date.now() - start >= duration) {
        clearInterval(interval);
        valueEl.textContent = finalText;
        if (subEl) subEl.textContent = finalSub || '';
        slotEl.classList.remove('rolling');
        resolve();
      }
    }, 60);
  });
}

async function smash() {
  const btn = document.getElementById('smashBtn');
  btn.disabled = true;

  let g1 = state.locked[1] && state.current[1] ? state.current[1] : pickGenreWithSub();
  let g2 = state.locked[2] && state.current[2] ? state.current[2] : pickGenreWithSub(g1.major);
  while (!state.locked[2] && g2.major === g1.major) {
    g2 = pickGenreWithSub(g1.major);
  }
  let character = state.locked[3] && state.current[3] ? state.current[3] : pick(CHARACTERS);
  let quirk = state.locked[4] && state.current[4] ? state.current[4] : pick(QUIRKS);

  state.current = { 1: g1, 2: g2, 3: character, 4: quirk };

  const genrePool = Object.keys(GENRES).flatMap(m => GENRES[m].map(s => ({ major: m, sub: s })));

  const promises = [];
  if (!state.locked[1]) promises.push(rollSlot(document.getElementById('slot1'), g1.major, g1.sub, genrePool, 700, true));
  else { document.getElementById('genre1').textContent = g1.major; document.getElementById('sub1').textContent = g1.sub; }

  if (!state.locked[2]) promises.push(rollSlot(document.getElementById('slot2'), g2.major, g2.sub, genrePool, 950, true));
  else { document.getElementById('genre2').textContent = g2.major; document.getElementById('sub2').textContent = g2.sub; }

  if (!state.locked[3]) promises.push(rollSlot(document.getElementById('slot3'), character, '', CHARACTERS, 1150, false));
  else { document.getElementById('character').textContent = character; }

  if (!state.locked[4]) promises.push(rollSlot(document.getElementById('slot4'), quirk, '', QUIRKS, 1350, false));
  else { document.getElementById('quirk').textContent = quirk; }

  await Promise.all(promises);

  const tpl = PITCH_TEMPLATES[Math.floor(Math.random() * PITCH_TEMPLATES.length)];
  const pitchEl = document.getElementById('pitch');
  pitchEl.classList.remove('empty');
  pitchEl.innerHTML = tpl(g1.sub, g2.sub, character, quirk);

  state.count++;
  document.getElementById('stats').textContent = `Pitches generated: ${state.count}`;
  document.getElementById('posterBtn').disabled = false;
  document.getElementById('posterArea').innerHTML = '';
  btn.disabled = false;
}

function generatePoster() {
  const g1 = state.current[1], g2 = state.current[2];
  const character = state.current[3], quirk = state.current[4];
  if (!g1 || !g2 || !character || !quirk) return;

  const stripParens = s => s.replace(/\s*\([^)]*\)\s*/g, '').trim();
  const prompt = `Movie poster for a ${stripParens(g1.sub)} meets ${stripParens(g2.sub)} film, starring a ${character} ${quirk}, dramatic cinematic lighting, bold typography, fake film title visible, vintage poster style`;
  const seed = Math.floor(Math.random() * 1000000);
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=768&height=1024&nologo=true&seed=${seed}`;

  const area = document.getElementById('posterArea');
  area.innerHTML = '<div class="loading">Conjuring poster from the AI dream void</div>';

  const img = new Image();
  img.referrerPolicy = 'no-referrer';
  img.onload = () => { area.innerHTML = ''; area.appendChild(img); };
  img.onerror = () => { area.innerHTML = '<div class="loading">Poster generation failed. Try again?</div>'; };
  img.src = url;
  img.alt = prompt;
}

document.getElementById('smashBtn').addEventListener('click', smash);
document.getElementById('posterBtn').addEventListener('click', generatePoster);

document.querySelectorAll('.lock').forEach(btn => {
  btn.addEventListener('click', () => {
    const slot = btn.dataset.slot;
    state.locked[slot] = !state.locked[slot];
    btn.classList.toggle('locked', state.locked[slot]);
    btn.textContent = state.locked[slot] ? '🔒 Locked' : '🔓 Lock';
  });
});

window.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON') {
    e.preventDefault();
    smash();
  }
});
</script>
</body>
</html>
